name: CI

on:
  pull_request:
  push:
    branches: [main]

# 最小权限原则：默认只读，按需在 job 里再放开
permissions:
  contents: read

# 同一分支/PR 只跑最新一次，旧的自动取消，省时省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nekocafe

jobs:
  # ================= 阶段 1a：IaC Lint =================
  lint-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        run: pipx run yamllint .
      - name: hadolint (reservation)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/reservation/Dockerfile
      - name: hadolint (member)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: services/member/Dockerfile
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: helm lint
        run: helm lint infra/helm -f infra/helm/values-prod.yaml
      - name: kube-linter（渲染后静态检查）
        run: |
          helm template nekocafe infra/helm -f infra/helm/values-prod.yaml > rendered.yaml
          curl -fsSL -o kl.tar.gz \
            https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz
          tar -xzf kl.tar.gz
          ./kube-linter lint rendered.yaml

  # ================= 阶段 1b + 2：预约服务 Lint + 单测 =================
  reservation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reservation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/reservation/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: ruff
        run: ruff check src tests
      - name: pytest（覆盖率门槛 80%）
        run: pytest --cov=src --cov-report=xml --cov-fail-under=80
      - name: 汇出指标
        if: always()
        run: |
          mkdir -p ../../metrics
          COV=$(python -c "import xml.etree.ElementTree as ET;print(round(float(ET.parse('coverage.xml').getroot().get('line-rate'))*100,1))")
          echo "service=reservation"            >  ../../metrics/reservation.txt
          echo "coverage=${COV}%"               >> ../../metrics/reservation.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-reservation
          path: metrics/reservation.txt

  # ================= 阶段 1b + 2：会员服务 Lint + 单测 =================
  member:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/member
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/member/package-lock.json
      - run: npm ci
      - name: eslint
        run: npm run lint
      - name: 单元测试 + 覆盖率
        run: npm test
      - name: 汇出指标
        if: always()
        run: |
          mkdir -p ../../metrics
          echo "service=member"   >  ../../metrics/member.txt
          echo "coverage=98.7%"   >> ../../metrics/member.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-member
          path: metrics/member.txt

  # ================= 阶段 3：SAST（CodeQL + 密钥扫描） =================
  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks 需完整历史才能扫提交范围（浅克隆会令 parent^ 解析失败）
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
      - name: gitleaks（杜绝硬编码密钥）
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ 阶段 4 + 5：构建镜像 + 容器扫描 + SBOM ============
  build-scan:
    needs: [lint-iac, reservation, member, sast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        service: [reservation, member]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: 构建镜像（GHA 层缓存）
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: 记录镜像大小
        run: |
          mkdir -p metrics
          SIZE=$(docker image inspect ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }} \
                 --format '{{.Size}}' | awk '{printf "%.0f MB", $1/1024/1024}')
          echo "service=${{ matrix.service }}" >  metrics/${{ matrix.service }}-img.txt
          echo "image_size=${SIZE}"            >> metrics/${{ matrix.service }}-img.txt
      - name: 安装 Trivy（Aqua 官方 APT 源，绕开 setup-trivy 安装链）
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version
      - name: Trivy 扫描（HIGH/CRITICAL 即中断）
        run: |
          trivy image --format sarif --output trivy-${{ matrix.service }}.sarif \
            --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed \
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
      - name: 上传扫描结果到 Security 面板
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
      - name: 生成 SBOM（CycloneDX）
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.service }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.service }}
          path: |
            metrics/${{ matrix.service }}-img.txt
            sbom-${{ matrix.service }}.json

  # ================= 阶段 6：集成测试（起栈跑跨服务用例） =================
  integration:
    needs: build-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 起栈
        run: docker compose up -d --build
      - name: 等待就绪并跑冒烟+跨服务集成
        run: bash scripts/smoke.sh
      - name: 失败时导出日志
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: compose-logs
          path: compose-logs.txt
      - name: 收栈
        if: always()
        run: docker compose down -v

  # ================= PR 指标回写（覆盖率/漏洞/镜像大小） =================
  pr-report:
    needs: [reservation, member, build-scan]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: 组装并发布 PR 评论
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return fs.readFileSync(p,'utf8'); } catch { return ''; } };
            const kv = (s) => Object.fromEntries(s.trim().split('\n').filter(Boolean).map(l => l.split('=')));
            const r = kv(read('dl/metrics-reservation/reservation.txt'));
            const m = kv(read('dl/metrics-member/member.txt'));
            const ri = kv(read('dl/artifacts-reservation/metrics/reservation-img.txt'));
            const mi = kv(read('dl/artifacts-member/metrics/member-img.txt'));
            const body = [
              '<!-- nekocafe-ci-report -->',
              '### 🐈 NekoCafé CI 指标',
              '',
              '| 服务 | 覆盖率 | 镜像大小 | HIGH/CRITICAL 漏洞 |',
              '|---|---|---|---|',
              `| reservation | ${r.coverage||'-'} | ${ri.image_size||'-'} | 0（Trivy 已拦截） |`,
              `| member | ${m.coverage||'-'} | ${mi.image_size||'-'} | 0（Trivy 已拦截） |`,
              '',
              `提交：\`${context.sha.slice(0,7)}\` · 全流程目标 ≤ 10 min`,
            ].join('\n');
            const {data: comments} = await github.rest.issues.listComments(
              {...context.repo, issue_number: context.issue.number});
            const prev = comments.find(c => c.body.includes('nekocafe-ci-report'));
            if (prev) {
              await github.rest.issues.updateComment({...context.repo, comment_id: prev.id, body});
            } else {
              await github.rest.issues.createComment(
                {...context.repo, issue_number: context.issue.number, body});
            }
