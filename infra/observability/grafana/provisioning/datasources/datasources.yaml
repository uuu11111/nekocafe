apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # 看 trace 时一键跳到对应时间窗的 Loki 日志
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # 从日志行里抽出 traceId，渲染成可点击链接直跳 Tempo —— 实现「日志 ↔ 链路」互跳
      derivedFields:
        - name: traceId
          matcherType: regex
          matcherRegex: '"traceId":"(\w+)"'
          datasourceUid: tempo
          url: "$${__value.raw}"
          urlDisplayLabel: "查看链路"
