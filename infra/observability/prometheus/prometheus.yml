global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: reservation
    metrics_path: /metrics
    static_configs:
      - targets: ["reservation:8080"]
        labels: { service: reservation }

  - job_name: member
    metrics_path: /metrics
    static_configs:
      - targets: ["member:8080"]
        labels: { service: member }

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
