# staging：贴近生产，2 副本起步、开 HPA/PDB，采样率降到 25%
env: staging
replicaCount: 2

config:
  logLevel: INFO
  otlpEndpoint: http://otel-collector.observability.svc:4318
  traceSampleRatio: "0.25"

ingress:
  host: staging.nekocafe.example.com

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
