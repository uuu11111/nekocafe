apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "nekocafe.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "nekocafe.selectorLabels" . | nindent 4 }}
    track: stable
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
{{- if gt (int .Values.canary.weight) 0 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-canary
  labels:
    {{- include "nekocafe.labels" . | nindent 4 }}
    track: canary
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "nekocafe.selectorLabels" . | nindent 4 }}
    track: canary
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
{{- end }}
