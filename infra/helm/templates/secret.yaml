{{- if .Values.secret.create }}
# ⚠️ 仅供本地/演示用：仅当显式 --set secret.create=true 时才渲染，且值来自部署期 --set，
# 绝不写死在 values 里入库。
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.existingSecret | default (printf "%s-secret" .Release.Name) }}
  labels:
    {{- include "nekocafe.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- else }}
# 默认不在 Chart 内创建 Secret。生产由 External Secrets / Sealed Secrets 在集群侧注入，
# Deployment 通过 .Values.existingSecret 以 envFrom.secretRef 引用。密钥永不落 Git。
{{- end }}
