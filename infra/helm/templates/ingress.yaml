{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "nekocafe.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ printf "%s(/|$)(.*)" .Values.ingress.pathPrefix }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.service.port }}
{{- if gt (int .Values.canary.weight) 0 }}
---
# 金丝雀 Ingress：靠 nginx 的 canary 注解按权重把流量切给金丝雀 Service。
# 「一行配置灰度到 5%」= 部署时加 --set canary.weight=5
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-canary
  labels:
    {{- include "nekocafe.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: {{ .Values.canary.weight | quote }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ printf "%s(/|$)(.*)" .Values.ingress.pathPrefix }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-canary
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- end }}
